name: CI

on:
  push:
    branches: [main, master, 'nexus/**']
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: 9.15.4
  NODE_VERSION: 20

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
        continue-on-error: true

  test:
    name: Test (${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests (shard ${{ matrix.shard }})
        run: npx vitest run --reporter=verbose --shard=${{ matrix.shard }}/${{ strategy.job-total }}
        timeout-minutes: 10

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r exec tsc
      - name: Verify dist outputs exist
        run: |
          for pkg in packages/*/ apps/*/; do
            if [ -f "$pkg/package.json" ]; then
              [ -d "$pkg/dist" ] && echo "✅ $pkg/dist exists" || echo "❌ $pkg/dist MISSING"
            fi
          done

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r exec tsc
      - name: Test nexus --help
        run: node apps/nexus-cli/dist/index.js --help
      - name: Test nexus doctor
        run: node apps/nexus-cli/dist/index.js doctor
        continue-on-error: true

  all-clear:
    name: All Clear
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test, build, cli-smoke]
    if: always()
    steps:
      - run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo '| Job | Status |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.lint-and-typecheck.result == 'success' && '✅' || '❌' }} Lint & Typecheck | ${{ needs.lint-and-typecheck.result }}' >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.test.result == 'success' && '✅' || '❌' }} Test | ${{ needs.test.result }}' >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.build.result == 'success' && '✅' || '❌' }} Build | ${{ needs.build.result }}' >> $GITHUB_STEP_SUMMARY
          echo '${{ needs.cli-smoke.result == 'success' && '✅' || '❌' }} CLI Smoke | ${{ needs.cli-smoke.result }}' >> $GITHUB_STEP_SUMMARY
